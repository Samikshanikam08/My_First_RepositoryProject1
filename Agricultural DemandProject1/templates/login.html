<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('https://images.pexels.com/photos/326082/pexels-photo-326082.jpeg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.9);
      padding: 40px 30px;
      width: 320px;
      border-radius: 8px;
      text-align: center;
      color: #fff;
      position: relative;
    }


    .login-box h2 {
      margin-top: 50px;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .login-box label {
      display: block;
      text-align: left;
      font-size: 14px;
      margin-top: 10px;
    }

    .login-box input {
      width: 100%;
      padding: 8px 5px;
      border: none;
      border-bottom: 1px solid #ccc;
      background: transparent;
      outline: none;
      color: rgb(242, 236, 236);
      font-size: 14px;
      margin-bottom: 15px;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #ff5a2c, #ff7730);
      border: none;
      border-radius: 25px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 15px 0;
      transition: 0.3s;
    }

    .login-box button:hover {
      background: linear-gradient(to right, #e04c20, #ff5a2c);
    }

    .login-box p {
      font-size: 13px;
      margin: 5px 0;
      color: #bbb;
      cursor: pointer;
    }

    .login-box p:hover {
      text-decoration: underline;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login Here</h2>
    <form action="/login" method="POST">
      <label>Username/Email</label>
      <input type="text" name="email" placeholder="Enter Username" required>
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
      <a href="/register">Don't have an account? Sign in</a>
    </form>
    {% if msg %}
    <p style="color: red;">{{ msg }}</p>
    {% endif %}
  </div>
</body>
</html>
